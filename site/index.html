<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>codepulse</title>
    <meta
      name="description"
      content="Adaptive runtime intelligence for AI coding agents — live behavioral model plus static structure, queried through a compact MCP surface."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&family=Syne:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="stage">
      <div class="trace" aria-hidden="true"></div>
      <section class="hero">
        <h1 class="brand">
          <span class="pulse" aria-hidden="true"></span>
          codepulse
        </h1>
        <p class="headline">Adaptive runtime intelligence for AI coding agents.</p>
        <p class="lede">
          A live behavioral model joined with static structure — queried through a compact
          MCP surface, not a firehose of traces.
        </p>
        <div class="actions">
          <a class="btn btn-primary" href="https://github.com/detroitpro/codepulse"
            >View on GitHub</a
          >
          <a
            class="btn btn-ghost"
            href="https://github.com/detroitpro/codepulse/blob/main/docs/PRODUCT.md"
            >Read the docs</a
          >
        </div>
        <p class="status">Design phase — docs and stubs only. No live instrumentation yet.</p>
      </section>
    </main>
  </body>
</html>
